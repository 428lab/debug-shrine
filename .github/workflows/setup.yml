name: Setup
on:
  push:

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1
  GCP_KEY_PATH: "/tmp/key.json"

jobs:
  actions-test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run actionlint
        shell: bash
        run: |
          set -ex
          bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: nodejs-${{ hashFiles('**/package-lock.json') }}
          restore-keys: nodejs-

      - name: Setup nuxt
        run: echo "${{ secrets.DEV_ENV }}" > .env
        working-directory: ./web

      - name: Generate nuxt
        run: |
          set -ex
          yarn
          yarn generate
        working-directory: ./web

      - name: Copy files
        run: |
          set -ex
          rm -rf app/dist
          cp -r web/dist app
        working-directory: ./

      - name: Setup firebase
        run: |
          set -ex
          npm install -g firebase-tools
          npm install
        working-directory: ./app/functions
