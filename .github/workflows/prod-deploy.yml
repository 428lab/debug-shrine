name: Product deploy
on:
  push:
    branches:
      - env/prod

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1
  GCP_KEY_PATH: "/tmp/key.json"

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run actionlint
        shell: bash
        run: |
          set -ex
          bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: nodejs-${{ hashFiles('**/package-lock.json') }}
          restore-keys: nodejs-

      - name: Setup nuxt
        run: echo "${{ secrets.PROD_ENV }}" > .env
        working-directory: ./web

      - name: Generate nuxt
        run: |
          set -ex
          yarn
          yarn generate
        working-directory: ./web

      - name: Copy files
        run: |
          set -ex
          rm -rf app/dist
          cp -r web/dist app
        working-directory: ./

      - name: Setup firebase
        run: |
          set -ex
          npm install -g firebase-tools
          npm install
        working-directory: ./app/functions

      # deploy setup
      - name: gcp_key file
        run: |
          set -ex
          echo "${{ secrets.PROD_GCLOUD_SERVICE_KEY }}" | base64 -d > ${{ env.GCP_KEY_PATH }}

      - name: Authenticate to Google Cloud
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.PROD_GCLOUD_SERVICE_KEY }}'

      - name: 'Use gcloud CLI'
        run: 'gcloud auth list --filter=status:ACTIVE --format="value(account)"'

      - name: 'Set up gcloud Cloud SDK environment'
        uses: 'google-github-actions/setup-gcloud@v2'
        with:
          install_components: ''
          project_id: 'd-shrine'

      - name: firebase deploy
        run: firebase deploy --project d-shrine
        working-directory: ./app
