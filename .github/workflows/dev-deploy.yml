on:
  push:
    branches:
      - env/dev

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1
  GCP_KEY_PATH: "/tmp/key.json"

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Run actionlint
        shell: bash
        run: |
          set -ex
          bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: "24.18.0"

      - name: cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: nuxt setup
        run: echo "${{ secrets.DEV_ENV }}" > .env
        working-directory: ./web

      - name: nuxt generate
        run: |
          yarn
          yarn generate
        working-directory: ./web

      - name: copy files
        run: |
          rm -rf app/dist
          cp -r web/dist app
        working-directory: ./

      - name: firebase setup
        run: |
          npm install -g firebase-tools
          npm install
        working-directory: ./app/functions

      # deploy setup
      - name: gcp_key file
        run: |
          set -ex
          echo "${{ secrets.DEV_GCLOUD_SERVICE_KEY }}" | base64 -d > ${{ env.GCP_KEY_PATH }}
      - uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.DEV_GCLOUD_SERVICE_KEY }}'

      - name: 'Use gcloud CLI'
        run: 'gcloud auth list --filter=status:ACTIVE --format="value(account)"'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'
        with:
          install_components: ''
          project_id: 'd-shrine-dev'

      - name: firebase deploy
        run: |
          firebase deploy --project d-shrine-dev --force
        working-directory: ./app

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: go build & test (functions-go)
        run: |
          go build ./...
          go vet ./...
          go test ./...
        working-directory: ./app/functions-go

      # Go版Cloud Run functions(statusGo)のデプロイ。既存のstatus(Node)とは別関数として
      # 共存させ、フロントエンドの切替タイミングを制御できるようにしている
      # (詳細は docs/backend.md「status エンドポイントのGo移植」を参照)。
      - name: enable required GCP services for Go functions
        run: |
          gcloud services enable \
            cloudfunctions.googleapis.com \
            run.googleapis.com \
            cloudbuild.googleapis.com \
            artifactregistry.googleapis.com \
            --project=d-shrine-dev

      - name: deploy statusGo (Cloud Run function, Go)
        run: |
          gcloud functions deploy statusGo \
            --project=d-shrine-dev \
            --gen2 \
            --runtime=go125 \
            --region=us-central1 \
            --source=. \
            --entry-point=StatusGo \
            --trigger-http \
            --allow-unauthenticated \
            --memory=256Mi \
            --timeout=30s
        working-directory: ./app/functions-go
