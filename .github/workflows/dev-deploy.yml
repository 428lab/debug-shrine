on:
  push:
    branches:
      - env/dev

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1
  GCP_KEY_PATH: "/tmp/key.json"

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Run actionlint
        shell: bash
        run: |
          set -ex
          bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: "24.18.0"

      - name: cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: nuxt setup
        run: echo "${{ secrets.DEV_ENV }}" > .env
        working-directory: ./web

      - name: nuxt generate
        run: |
          yarn
          yarn generate
        working-directory: ./web

      - name: copy files
        run: |
          rm -rf app/dist
          cp -r web/dist app
        working-directory: ./

      - name: firebase setup
        run: |
          npm install -g firebase-tools
          npm install
        working-directory: ./app/functions

      # deploy setup
      - name: gcp_key file
        run: |
          set -ex
          echo "${{ secrets.DEV_GCLOUD_SERVICE_KEY }}" | base64 -d > ${{ env.GCP_KEY_PATH }}
      - uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.DEV_GCLOUD_SERVICE_KEY }}'

      - name: 'Use gcloud CLI'
        run: 'gcloud auth list --filter=status:ACTIVE --format="value(account)"'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'
        with:
          install_components: ''
          project_id: 'd-shrine-dev'

      - name: firebase deploy
        run: |
          firebase deploy --project d-shrine-dev --force
        working-directory: ./app

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: go build & test (functions-go)
        run: |
          go build ./...
          go vet ./...
        working-directory: ./app/functions-go

      # Firestoreエミュレータの実行にはJDK 21以上が必要(firebase-toolsの要件)。
      # ubuntu-22.04ランナーのデフォルトJavaはこれを満たさないため明示的にセットアップする。
      - name: setup java (for Firestore emulator)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      # sanpai/ranking/register/statusCacheBackfill等のFirestore統合テストは
      # FIRESTORE_EMULATOR_HOST未設定時は自動スキップされる設計(README参照)。
      # CIでも実際に検証されるよう、Firestoreエミュレータを起動した状態で
      # go test を実行する(firebase emulators:exec が終了時に自動でエミュレータを
      # 落とすため、後続ステップに影響しない)。
      - name: go test (functions-go, with Firestore emulator)
        run: |
          firebase emulators:exec --project d-shrine-dev --only firestore \
            'cd functions-go && go test ./...'
        working-directory: ./app

      # Go版Cloud Run functions(statusGo)のデプロイ。既存のstatus(Node)とは別関数として
      # 共存させ、フロントエンドの切替タイミングを制御できるようにしている
      # (詳細は docs/backend.md「status エンドポイントのGo移植」を参照)。
      - name: enable required GCP services for Go functions
        run: |
          gcloud services enable \
            cloudfunctions.googleapis.com \
            run.googleapis.com \
            cloudbuild.googleapis.com \
            artifactregistry.googleapis.com \
            --project=d-shrine-dev

      - name: deploy statusGo (Cloud Run function, Go)
        run: |
          gcloud functions deploy statusGo \
            --project=d-shrine-dev \
            --gen2 \
            --runtime=go125 \
            --region=us-central1 \
            --source=. \
            --entry-point=StatusGo \
            --trigger-http \
            --allow-unauthenticated \
            --memory=256Mi \
            --timeout=30s
        working-directory: ./app/functions-go

      # Go版Cloud Run functions(sanpaiGo)のデプロイ。既存のsanpai(Node)とは別関数として
      # 共存させ、フロントエンドの切替タイミングを制御できるようにしている
      # (詳細は docs/backend.md「sanpai エンドポイントのGo移植」を参照)。
      #
      # GitHub OAuth Appのclient_id/client_secretは、Node版が使う
      # `firebase functions:config:get` (既にGCP側に設定済みの値)からそのまま取得し、
      # 新規のGitHub Secretsは増やさない。ログに値が出ないよう ::add-mask:: で
      # マスクしてから $GITHUB_ENV に渡す。
      - name: fetch GitHub OAuth credentials for sanpaiGo
        run: |
          set -eo pipefail
          CONFIG_JSON=$(firebase functions:config:get github --project d-shrine-dev)
          CLIENT_ID=$(echo "$CONFIG_JSON" | jq -r '.client_id')
          CLIENT_SECRET=$(echo "$CONFIG_JSON" | jq -r '.client_secret')
          echo "::add-mask::$CLIENT_ID"
          echo "::add-mask::$CLIENT_SECRET"
          echo "SANPAI_GH_CLIENT_ID=$CLIENT_ID" >> "$GITHUB_ENV"
          echo "SANPAI_GH_CLIENT_SECRET=$CLIENT_SECRET" >> "$GITHUB_ENV"
        working-directory: ./app

      - name: deploy sanpaiGo (Cloud Run function, Go)
        run: |
          gcloud functions deploy sanpaiGo \
            --project=d-shrine-dev \
            --gen2 \
            --runtime=go125 \
            --region=us-central1 \
            --source=. \
            --entry-point=SanpaiGo \
            --trigger-http \
            --allow-unauthenticated \
            --memory=256Mi \
            --timeout=30s \
            --set-env-vars=GITHUB_CLIENT_ID=${{ env.SANPAI_GH_CLIENT_ID }},GITHUB_CLIENT_SECRET=${{ env.SANPAI_GH_CLIENT_SECRET }},SANPAI_NEXT_TIME_SECONDS=60
        working-directory: ./app/functions-go

      # Go版Cloud Run functions(registerGo)のデプロイ。既存のregister(Node)とは別関数として
      # 共存させる(詳細は docs/backend.md「register エンドポイントのGo移植」を参照)。
      - name: deploy registerGo (Cloud Run function, Go)
        run: |
          gcloud functions deploy registerGo \
            --project=d-shrine-dev \
            --gen2 \
            --runtime=go125 \
            --region=us-central1 \
            --source=. \
            --entry-point=RegisterGo \
            --trigger-http \
            --allow-unauthenticated \
            --memory=256Mi \
            --timeout=30s
        working-directory: ./app/functions-go

      # Go版Cloud Run functions(rankingGo)のデプロイ。既存のranking(Node)とは別関数として
      # 共存させる(詳細は docs/backend.md「ranking エンドポイントのGo移植」を参照)。
      - name: deploy rankingGo (Cloud Run function, Go)
        run: |
          gcloud functions deploy rankingGo \
            --project=d-shrine-dev \
            --gen2 \
            --runtime=go125 \
            --region=us-central1 \
            --source=. \
            --entry-point=RankingGo \
            --trigger-http \
            --allow-unauthenticated \
            --memory=256Mi \
            --timeout=30s
        working-directory: ./app/functions-go

      # Go版Cloud Run functions(ogpRewriteGo)のデプロイ。既存のogpRewrite(Node)とは
      # 別関数として共存させる(詳細は docs/backend.md「ogpRewrite エンドポイントのGo移植」を参照)。
      #
      # FUNC_BASE_URLはNode版が functions.config().func.base_url から読む値と同じもので、
      # sanpaiGoのGitHub資格情報と同様に既存のFirebase Functions Configから取得する。
      - name: fetch base_url for ogpRewriteGo
        run: |
          set -eo pipefail
          CONFIG_JSON=$(firebase functions:config:get func --project d-shrine-dev)
          BASE_URL=$(echo "$CONFIG_JSON" | jq -r '.base_url')
          echo "OGP_FUNC_BASE_URL=$BASE_URL" >> "$GITHUB_ENV"
        working-directory: ./app

      - name: deploy ogpRewriteGo (Cloud Run function, Go)
        run: |
          gcloud functions deploy ogpRewriteGo \
            --project=d-shrine-dev \
            --gen2 \
            --runtime=go125 \
            --region=us-central1 \
            --source=. \
            --entry-point=OgpRewriteGo \
            --trigger-http \
            --allow-unauthenticated \
            --memory=256Mi \
            --timeout=30s \
            --set-env-vars=FUNC_BASE_URL=${{ env.OGP_FUNC_BASE_URL }},OGP_PROJECT_ID=d-shrine-dev
        working-directory: ./app/functions-go

      # スケジュール関数(Pub/Sub トリガー)のGo移植分。既存のNode版
      # (rankingUpdate/rankingCache/statusCacheBackfill/scheduledOgpDelete)とは
      # 別のCloud Scheduler ジョブ・Pub/Subトピック・関数名で完全に独立してデプロイし、
      # 安定稼働を確認してからNode版を止める(詳細は docs/backend.md
      # 「スケジュール関数のGo移植」を参照)。
      #
      # Cloud SchedulerジョブはApp Engineのロケーションに紐づくため、
      # 既存プロジェクトの設定値を動的に取得して使う。
      - name: enable required GCP services for scheduled Go functions
        run: |
          gcloud services enable \
            pubsub.googleapis.com \
            cloudscheduler.googleapis.com \
            eventarc.googleapis.com \
            --project=d-shrine-dev

      # Cloud Functions(Gen2)の --trigger-topic は Gen1と異なりPub/Subトピックを
      # 自動作成しない(存在しないトピックを指定すると
      # `Validation failed for trigger ...: Resource not found` で即失敗する)。
      # そのため各スケジュール関数用トピックを事前に作成しておく
      # (既に存在すれば describe が成功するのでスキップする、冪等な実装)。
      - name: create Pub/Sub topics for scheduled Go functions
        run: |
          for TOPIC in ranking-update-go ranking-cache-go status-cache-backfill-go scheduled-ogp-delete-go; do
            gcloud pubsub topics describe "$TOPIC" --project=d-shrine-dev \
              || gcloud pubsub topics create "$TOPIC" --project=d-shrine-dev
          done

      # Cloud SchedulerジョブのlocationはプロジェクトのApp Engineアプリと
      # 同一でなければならない(App Engineが存在するプロジェクトでは、それ以外の
      # リージョンを指定すると `Location must equal <app-engine-location>` エラーになる)。
      # `gcloud app describe` が返す locationId はレガシーなApp Engine表記
      # (例: "us-central")の場合があり、Cloud Scheduler/Cloud Functions等の
      # 通常のCloudリージョン表記(例: "us-central1")とは異なることがあるため、
      # 既知の対応表で変換する。
      - name: resolve App Engine location for Cloud Scheduler
        run: |
          set -eo pipefail
          RAW_LOCATION=$(gcloud app describe --project=d-shrine-dev --format='value(locationId)')
          case "$RAW_LOCATION" in
            us-central) LOCATION=us-central1 ;;
            europe-west) LOCATION=europe-west1 ;;
            *) LOCATION="$RAW_LOCATION" ;;
          esac
          echo "resolved App Engine location: $RAW_LOCATION -> $LOCATION"
          echo "APP_ENGINE_LOCATION=$LOCATION" >> "$GITHUB_ENV"

      # timeout=300s: Node版はrunWith()を使わずデフォルト(60s)のままだが、
      # 全ユーザーをスキャンする処理のため安全側に長めの値を明示指定する
      # (実行時間そのものはNode版と同等の想定で、上限を厳しくしすぎて
      # ユーザー数増加時にタイムアウトする事故を避けるのが目的)。
      - name: deploy rankingUpdateGo (Cloud Run function, Go, Pub/Sub trigger)
        run: |
          gcloud functions deploy rankingUpdateGo \
            --project=d-shrine-dev \
            --gen2 \
            --runtime=go125 \
            --region=us-central1 \
            --source=. \
            --entry-point=RankingUpdateGo \
            --trigger-topic=ranking-update-go \
            --memory=256Mi \
            --timeout=300s
        working-directory: ./app/functions-go

      - name: create/update Cloud Scheduler job for rankingUpdateGo
        run: |
          gcloud scheduler jobs update pubsub ranking-update-go \
            --project=d-shrine-dev --location=${{ env.APP_ENGINE_LOCATION }} \
            --schedule="0 * * * *" \
            --topic=ranking-update-go \
            --message-body="{}" \
            --time-zone=Etc/UTC \
          || gcloud scheduler jobs create pubsub ranking-update-go \
            --project=d-shrine-dev --location=${{ env.APP_ENGINE_LOCATION }} \
            --schedule="0 * * * *" \
            --topic=ranking-update-go \
            --message-body="{}" \
            --time-zone=Etc/UTC

      # timeout=300s: rankingUpdateGoと同様の理由(全ユーザースキャンのため安全側)。
      - name: deploy rankingCacheGo (Cloud Run function, Go, Pub/Sub trigger)
        run: |
          gcloud functions deploy rankingCacheGo \
            --project=d-shrine-dev \
            --gen2 \
            --runtime=go125 \
            --region=us-central1 \
            --source=. \
            --entry-point=RankingCacheGo \
            --trigger-topic=ranking-cache-go \
            --memory=256Mi \
            --timeout=300s
        working-directory: ./app/functions-go

      - name: create/update Cloud Scheduler job for rankingCacheGo
        run: |
          gcloud scheduler jobs update pubsub ranking-cache-go \
            --project=d-shrine-dev --location=${{ env.APP_ENGINE_LOCATION }} \
            --schedule="0 */2 * * *" \
            --topic=ranking-cache-go \
            --message-body="{}" \
            --time-zone=Etc/UTC \
          || gcloud scheduler jobs create pubsub ranking-cache-go \
            --project=d-shrine-dev --location=${{ env.APP_ENGINE_LOCATION }} \
            --schedule="0 */2 * * *" \
            --topic=ranking-cache-go \
            --message-body="{}" \
            --time-zone=Etc/UTC

      - name: deploy statusCacheBackfillGo (Cloud Run function, Go, Pub/Sub trigger)
        run: |
          gcloud functions deploy statusCacheBackfillGo \
            --project=d-shrine-dev \
            --gen2 \
            --runtime=go125 \
            --region=us-central1 \
            --source=. \
            --entry-point=StatusCacheBackfillGo \
            --trigger-topic=status-cache-backfill-go \
            --memory=512Mi \
            --timeout=300s
        working-directory: ./app/functions-go

      - name: create/update Cloud Scheduler job for statusCacheBackfillGo
        run: |
          gcloud scheduler jobs update pubsub status-cache-backfill-go \
            --project=d-shrine-dev --location=${{ env.APP_ENGINE_LOCATION }} \
            --schedule="*/30 * * * *" \
            --topic=status-cache-backfill-go \
            --message-body="{}" \
            --time-zone=Etc/UTC \
          || gcloud scheduler jobs create pubsub status-cache-backfill-go \
            --project=d-shrine-dev --location=${{ env.APP_ENGINE_LOCATION }} \
            --schedule="*/30 * * * *" \
            --topic=status-cache-backfill-go \
            --message-body="{}" \
            --time-zone=Etc/UTC

      # timeout=300s: OGPキャッシュファイル数が多い場合でも一覧・削除が
      # 途中で打ち切られないよう安全側に長めの値を明示指定する。
      - name: deploy scheduledOgpDeleteGo (Cloud Run function, Go, Pub/Sub trigger)
        run: |
          gcloud functions deploy scheduledOgpDeleteGo \
            --project=d-shrine-dev \
            --gen2 \
            --runtime=go125 \
            --region=us-central1 \
            --source=. \
            --entry-point=ScheduledOgpDeleteGo \
            --trigger-topic=scheduled-ogp-delete-go \
            --memory=256Mi \
            --timeout=300s \
            --set-env-vars=STORAGE_BUCKET_NAME=d-shrine-dev.appspot.com
        working-directory: ./app/functions-go

      - name: create/update Cloud Scheduler job for scheduledOgpDeleteGo
        run: |
          gcloud scheduler jobs update pubsub scheduled-ogp-delete-go \
            --project=d-shrine-dev --location=${{ env.APP_ENGINE_LOCATION }} \
            --schedule="0 */1 * * *" \
            --topic=scheduled-ogp-delete-go \
            --message-body="{}" \
            --time-zone=Etc/UTC \
          || gcloud scheduler jobs create pubsub scheduled-ogp-delete-go \
            --project=d-shrine-dev --location=${{ env.APP_ENGINE_LOCATION }} \
            --schedule="0 */1 * * *" \
            --topic=scheduled-ogp-delete-go \
            --message-body="{}" \
            --time-zone=Etc/UTC
